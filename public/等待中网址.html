<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乃希 — Site Under Construction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;700&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ef;
  --ink: #1a1714;
  --muted: #9a9188;
  --accent: #c0392b;
  --line: rgba(26,23,20,0.1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--bg);
  color: var(--ink);
  font-family: 'Zen Kaku Gothic New', 'Noto Serif SC', sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}

body::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(var(--line) 1px, transparent 1px);
  background-size: 30px 30px;
  z-index: -1;
}

.container {
  max-width: 650px;
  padding: 2rem;
  animation: fadeIn 1.2s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.eyebrow {
  font-size: 0.7rem;
  letter-spacing: 0.5em;
  color: var(--muted);
  margin-bottom: 2rem;
  text-transform: uppercase;
}

h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 3.5rem;
  font-weight: 700;
  margin-bottom: 1rem;
  letter-spacing: 0.1em;
}

.sub-text {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 3rem;
  letter-spacing: 0.1em;
}

.loader {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 3.5rem;
}
.dot {
  width: 5px;
  height: 5px;
  background-color: var(--accent);
  border-radius: 50%;
  animation: pulse 1.4s infinite ease-in-out;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
  0%, 80%, 100% { transform: scale(0.3); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}

.social-links {
  border-top: 1px solid var(--line);
  padding-top: 2.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  align-items: center;
}

.link-group {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
  justify-content: center;
}

.social-links a, .social-links span {
  text-decoration: none;
  color: var(--ink2);
  font-size: 0.8rem;
  transition: color 0.3s;
}

.social-links a:hover {
  color: var(--accent);
}

.footer-text {
  position: absolute;
  bottom: 3rem;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.1em;
}

/* 移动端字体缩小一点 */
@media (max-width: 480px) {
  h1 { font-size: 2.5rem; }
  .link-group { flex-direction: column; gap: 0.5rem; }
}
</style>
</head>
<body>

<div class="container">
  <p class="eyebrow">COMING SOON</p>
  <h1>乃希<span>.</span></h1>
  <p class="sub-text">新站点正在精心建设中，期待与你见面。</p>
  
  <div class="loader">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="social-links">
    <div class="link-group">
      <a href="https://twitter.com/chengzhenghao" target="_blank">Twitter / @chengzhenghao</a>
      <span>QQ / 3416246182</span>
      <a href="mailto:1@乃希.com">Email / 1@乃希.com</a>
    </div>
  </div>
</div>

<p class="footer-text">© 2025 NAIXI.COM</p>

</body>
</html>
