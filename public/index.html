<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乃希 | 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", sans-serif;
            background: #0f0f11;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 700px;
            width: 100%;
            animation: fadeIn 1.2s ease;
        }

        .avatar {
            width: 130px;
            height: 130px;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(106, 17, 203, 0.4);
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #7953ff, #21d4fd);
            -webkit-background-clip: text;
            color: transparent;
        }

        .bio {
            font-size: 18px;
            color: #bbb;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .link-btn {
            padding: 14px 28px;
            background: #1a1a1d;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s;
        }

        .link-btn:hover {
            border-color: #7953ff;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(121, 83, 255, 0.2);
        }

        .footer {
            margin-top: 50px;
            color: #666;
            font-size: 14px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">N</div>
        <h1>乃希</h1>
        <p class="bio">热爱编程、设计与创造 | 正在构建自己的小世界</p>

        <div class="links">
            <a href="#" class="link-btn">GitHub</a>
            <a href="#" class="link-btn">博客</a>
            <a href="#" class="link-btn">项目</a>
            <a href="#" class="link-btn">联系我</a>
        </div>

        <div class="footer">
            © 2025 乃希 | 由 Cloudflare 强力驱动
        </div>
    </div>
</body>
</html>
