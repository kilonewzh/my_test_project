<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAIXI · ECO STUMP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#06080a;
color:#fff;
font-family:system-ui,sans-serif;
overflow:hidden;
}
#c{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}
.ui{
position:fixed;
top:30px;
left:30px;
z-index:99;
}
.ui h1{
font-size:22px;
font-weight:400;
margin-bottom:6px;
}
.ui p{
font-size:13px;
opacity:.6;
}
</style>
</head>
<body>
<div class="ui">
<h1>NAIXI · ECO STUMP</h1>
<p>移动鼠标 → 粒子追踪 → 唤醒树桩生态</p>
</div>
<canvas id="c"></canvas>

<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
let w=c.width=innerWidth;
let h=c.height=innerHeight;

let mx=w/2,my=h/2;
window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
window.addEventListener('resize',()=>{w=c.width=innerWidth;h=c.height=innerHeight});

class Particle{
constructor(){
this.x=mx;
this.y=my;
this.s=Math.random()*2+1;
this.ax=0;
this.ay=0;
this.alpha=1;
}
update(){
this.ax+=(mx-this.x)*0.02;
this.ay+=(my-this.y)*0.02;
this.x+=this.ax;
this.y+=this.ay;
this.ax*=0.8;
this.ay*=0.8;
this.alpha-=0.015;
}
draw(){
ctx.globalAlpha=this.alpha;
ctx.fillStyle='#66d9ff';
ctx.beginPath();
ctx.arc(this.x,this.y,this.s,0,Math.PI*2);
ctx.fill();
}
}

let particles=[];

function drawStump(){
const cx=w/2,cy=h/2;
ctx.save();
ctx.translate(cx,cy);

// 底部阴影
ctx.fillStyle='#0a0c0e';
ctx.beginPath();
ctx.ellipse(0,100,220,90,0,0,Math.PI*2);
ctx.fill();

// 树桩主体
const g=ctx.createRadialGradient(0,-40,0,0,-40,260);
g.addColorStop(0,'#3a2a1e');
g.addColorStop(0.6,'#2b1f16');
g.addColorStop(1,'#1a130d');
ctx.fillStyle=g;
ctx.beginPath();
ctx.ellipse(0,0,200,80,0,0,Math.PI*2);
ctx.fill();

// 年轮
ctx.strokeStyle='#554232';
ctx.lineWidth=1.2;
for(let i=40;i<180;i+=25){
ctx.beginPath();
ctx.ellipse(0,0,i,i*0.38,0,0,Math.PI*2);
ctx.stroke();
}

// 裂纹
ctx.strokeStyle='#15100a';
ctx.lineWidth=1.5;
for(let i=0;i<6;i++){
const a=Math.random()*Math.PI*2;
const l=40+Math.random()*100;
ctx.beginPath();
ctx.moveTo(Math.cos(a)*30,Math.sin(a)*15);
ctx.lineTo(Math.cos(a)*l,Math.sin(a)*l*0.35);
ctx.stroke();
}

// 鼠标感应光
const dx=mx-cx;
const dy=my-cy;
const d=Math.hypot(dx,dy);
if(d<190){
const lg=ctx.createRadialGradient(dx,dy*0.45,0,dx,dy*0.45,60);
lg.addColorStop(0,'rgba(110,220,255,0.9)');
lg.addColorStop(0.5,'rgba(80,180,255,0.3)');
lg.addColorStop(1,'rgba(30,100,255,0)');
ctx.fillStyle=lg;
ctx.beginPath();
ctx.arc(dx,dy*0.45,60,0,Math.PI*2);
ctx.fill();

// 荧光苔藓
for(let i=0;i<12;i++){
const a=Math.random()*Math.PI*2;
const r=20+Math.random()*120;
const x=Math.cos(a)*r;
const y=Math.sin(a)*r*0.4;
if(Math.hypot(x-dx,y-dy*0.45)<50){
ctx.fillStyle='rgba(140,255,180,0.85)';
ctx.beginPath();
ctx.arc(x,y,1.8+Math.random()*2,0,Math.PI*2);
ctx.fill();
}
}
}

ctx.restore();
}

function loop(){
ctx.fillStyle='rgba(6,8,10,0.15)';
ctx.fillRect(0,0,w,h);

drawStump();

particles.push(new Particle);
particles=particles.filter(p=>p.alpha>0.1);
particles.forEach(p=>{p.update();p.draw()});

requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
